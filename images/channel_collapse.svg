<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" width="520" height="280" xmlns="http://www.w3.org/2000/svg">
  <!-- Figure: Channel before and after vertex collapse -->
  <!-- Left: sleeve with original diagonals showing sharp turns -->
  <!-- Right: sleeve with collapsed diagonals showing smooth path -->

  <!-- ===== LEFT PANEL: Before collapse ===== -->
  <g transform="translate(0,20)">
    <text x="125" y="0" text-anchor="middle" font-size="12" font-family="serif" font-weight="bold">(a) Before collapse</text>

    <!-- Source node S (actual boundary) -->
    <rect x="15" y="75" width="50" height="35" rx="4" fill="#ddd" stroke="black" stroke-width="1.5"/>
    <text x="40" y="97" text-anchor="middle" font-size="11" font-family="serif" font-weight="bold">S</text>
    <!-- Padded boundary of S -->
    <rect x="5" y="65" width="70" height="55" rx="2" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Target node T -->
    <rect x="185" y="115" width="50" height="35" rx="4" fill="#ddd" stroke="black" stroke-width="1.5"/>
    <text x="210" y="137" text-anchor="middle" font-size="11" font-family="serif" font-weight="bold">T</text>
    <!-- Padded boundary of T -->
    <rect x="175" y="105" width="70" height="55" rx="2" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Obstacle O in between -->
    <rect x="90" y="40" width="50" height="35" rx="3" fill="#eee" stroke="black" stroke-width="1"/>
    <text x="115" y="62" text-anchor="middle" font-size="10" font-family="serif">O</text>
    <rect x="80" y="30" width="70" height="55" rx="2" fill="none" stroke="#888" stroke-width="0.7" stroke-dasharray="3,2"/>

    <!-- Sleeve triangles (shaded) -->
    <polygon points="75,65 80,30 40,65" fill="#cde4f7" fill-opacity="0.35" stroke="#4a90d9" stroke-width="0.5"/>
    <polygon points="75,65 80,30 150,30" fill="#cde4f7" fill-opacity="0.35" stroke="#4a90d9" stroke-width="0.5"/>
    <polygon points="75,65 150,30 150,85" fill="#cde4f7" fill-opacity="0.35" stroke="#4a90d9" stroke-width="0.5"/>
    <polygon points="75,65 150,85 75,120" fill="#cde4f7" fill-opacity="0.35" stroke="#4a90d9" stroke-width="0.5"/>
    <polygon points="75,120 150,85 175,105" fill="#cde4f7" fill-opacity="0.35" stroke="#4a90d9" stroke-width="0.5"/>
    <polygon points="175,105 150,85 175,160" fill="#cde4f7" fill-opacity="0.35" stroke="#4a90d9" stroke-width="0.5"/>
    <polygon points="175,105 175,160 210,160" fill="#cde4f7" fill-opacity="0.35" stroke="#4a90d9" stroke-width="0.5"/>

    <!-- Diagonals (shared edges between consecutive triangles) -->
    <g stroke="#4a90d9" stroke-width="1.2" stroke-dasharray="4,3">
      <line x1="75" y1="65" x2="80" y2="30"/>
      <line x1="75" y1="65" x2="150" y2="30"/>
      <line x1="75" y1="65" x2="150" y2="85"/>
      <line x1="150" y1="85" x2="75" y2="120"/>
      <line x1="150" y1="85" x2="175" y2="105"/>
      <line x1="175" y1="105" x2="175" y2="160"/>
    </g>

    <!-- Diagonal endpoint labels (obstacle corner vertices) -->
    <g fill="#4a90d9" font-size="8" font-family="serif">
      <circle cx="75" cy="65" r="3" fill="#4a90d9"/>
      <text x="72" y="60" text-anchor="end">a₁</text>
      <circle cx="5" cy="120" r="2.5" fill="#4a90d9"/>
      <circle cx="75" cy="120" r="3" fill="#4a90d9"/>
      <text x="72" y="135" text-anchor="end">a₂</text>
      <circle cx="80" cy="30" r="2.5" fill="#999"/>
      <circle cx="150" cy="30" r="2.5" fill="#999"/>
      <circle cx="150" cy="85" r="2.5" fill="#999"/>
      <circle cx="175" cy="105" r="3" fill="#e67e22"/>
      <text x="168" y="100" text-anchor="end" fill="#e67e22">b₁</text>
      <circle cx="175" cy="160" r="3" fill="#e67e22"/>
      <text x="168" y="170" text-anchor="end" fill="#e67e22">b₂</text>
    </g>

    <!-- Funnel path (with sharp turns at obstacle corners) -->
    <polyline points="40,92 75,65 150,30 150,85 175,105 210,132"
              fill="none" stroke="#c0392b" stroke-width="2"/>
    <circle cx="40" cy="92" r="3.5" fill="#c0392b"/>
    <circle cx="210" cy="132" r="3.5" fill="#c0392b"/>

    <!-- Sharp turn annotations -->
    <g font-size="8" font-family="serif" fill="#e67e22">
      <path d="M 69,58 Q 75,50 81,58" fill="none" stroke="#e67e22" stroke-width="1.2"/>
      <path d="M 169,98 Q 175,90 181,98" fill="none" stroke="#e67e22" stroke-width="1.2"/>
    </g>

    <!-- Legend -->
    <text x="125" y="210" text-anchor="middle" font-size="9" font-family="serif" fill="#888">a₁, a₂ = S-obstacle corners; b₁, b₂ = T-obstacle corners</text>
    <text x="125" y="225" text-anchor="middle" font-size="9" font-family="serif" fill="#c0392b">red = funnel path (sharp turns at corners)</text>
  </g>

  <!-- ===== RIGHT PANEL: After collapse ===== -->
  <g transform="translate(270,20)">
    <text x="125" y="0" text-anchor="middle" font-size="12" font-family="serif" font-weight="bold">(b) After collapse</text>

    <!-- Source node S -->
    <rect x="15" y="75" width="50" height="35" rx="4" fill="#ddd" stroke="black" stroke-width="1.5"/>
    <text x="40" y="97" text-anchor="middle" font-size="11" font-family="serif" font-weight="bold">S</text>
    <!-- Padded boundary (faded — collapsed) -->
    <rect x="5" y="65" width="70" height="55" rx="2" fill="none" stroke="#ccc" stroke-width="0.7" stroke-dasharray="2,3"/>

    <!-- Target node T -->
    <rect x="185" y="115" width="50" height="35" rx="4" fill="#ddd" stroke="black" stroke-width="1.5"/>
    <text x="210" y="137" text-anchor="middle" font-size="11" font-family="serif" font-weight="bold">T</text>
    <!-- Padded boundary (faded — collapsed) -->
    <rect x="175" y="105" width="70" height="55" rx="2" fill="none" stroke="#ccc" stroke-width="0.7" stroke-dasharray="2,3"/>

    <!-- Obstacle O -->
    <rect x="90" y="40" width="50" height="35" rx="3" fill="#eee" stroke="black" stroke-width="1"/>
    <text x="115" y="62" text-anchor="middle" font-size="10" font-family="serif">O</text>
    <rect x="80" y="30" width="70" height="55" rx="2" fill="none" stroke="#888" stroke-width="0.7" stroke-dasharray="3,2"/>

    <!-- Collapse arrows: obstacle corners → centers -->
    <g stroke="#4a90d9" stroke-width="0.8" fill="none" marker-end="url(#arrowBlue)">
      <line x1="75" y1="65" x2="43" y2="90"/>
      <line x1="75" y1="120" x2="43" y2="94"/>
      <line x1="175" y1="105" x2="207" y2="130"/>
      <line x1="175" y1="160" x2="207" y2="134"/>
    </g>
    <defs>
      <marker id="arrowBlue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="#4a90d9"/>
      </marker>
    </defs>

    <!-- Modified diagonals after collapse -->
    <!-- d₁ was (a₁, opp) → now (s, opp) — widened -->
    <!-- d₂ was (a₂, opp) → now (s, opp) — widened -->
    <!-- d₅ was (b₁, opp) → now (t, opp) — widened -->
    <!-- d₆ was (b₁, b₂) → degenerate (t, t) → REMOVED -->
    <g stroke="#27ae60" stroke-width="1.2" stroke-dasharray="4,3">
      <line x1="40" y1="92" x2="80" y2="30"/>
      <line x1="40" y1="92" x2="150" y2="30"/>
      <line x1="40" y1="92" x2="150" y2="85"/>
      <line x1="150" y1="85" x2="40" y2="92"/>
      <line x1="150" y1="85" x2="210" y2="132"/>
      <!-- d6 (b1→b2) is removed: both collapse to t -->
    </g>

    <!-- Free-space vertices (unchanged) -->
    <g fill="#999">
      <circle cx="80" cy="30" r="2.5"/>
      <circle cx="150" cy="30" r="2.5"/>
      <circle cx="150" cy="85" r="2.5"/>
    </g>

    <!-- Collapsed centers -->
    <circle cx="40" cy="92" r="4" fill="#27ae60" stroke="white" stroke-width="1"/>
    <text x="30" y="86" text-anchor="end" font-size="8" font-family="serif" fill="#27ae60" font-weight="bold">s</text>
    <circle cx="210" cy="132" r="4" fill="#27ae60" stroke="white" stroke-width="1"/>
    <text x="225" y="128" text-anchor="start" font-size="8" font-family="serif" fill="#27ae60" font-weight="bold">t</text>

    <!-- Funnel path (smooth — no sharp turns) -->
    <polyline points="40,92 150,30 150,85 210,132"
              fill="none" stroke="#27ae60" stroke-width="2.5"/>

    <!-- Strike-through on removed diagonal -->
    <text x="195" y="175" text-anchor="middle" font-size="8" font-family="serif" fill="#999" font-style="italic">d₆ removed</text>

    <!-- Legend -->
    <text x="125" y="210" text-anchor="middle" font-size="9" font-family="serif" fill="#4a90d9">blue arrows: corners collapsed to center</text>
    <text x="125" y="225" text-anchor="middle" font-size="9" font-family="serif" fill="#27ae60">green = funnel path (smooth exit/entry)</text>
  </g>
</svg>
