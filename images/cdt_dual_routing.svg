<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" width="400" height="280" xmlns="http://www.w3.org/2000/svg">
  <!-- Figure: Direct routing on CDT dual graph -->
  <!-- Sleeve goes AROUND obstacles through free-space triangles -->

  <rect width="400" height="280" fill="white"/>

  <!-- Source node S -->
  <rect x="20" y="110" width="55" height="36" rx="4" fill="#ddd" stroke="black" stroke-width="1.5"/>
  <text x="47" y="133" text-anchor="middle" font-size="12" font-family="serif" font-weight="bold">S</text>

  <!-- Target node T -->
  <rect x="320" y="110" width="55" height="36" rx="4" fill="#ddd" stroke="black" stroke-width="1.5"/>
  <text x="347" y="133" text-anchor="middle" font-size="12" font-family="serif" font-weight="bold">T</text>

  <!-- Obstacles O1 and O2 -->
  <rect x="148" y="60" width="55" height="36" rx="3" fill="#eee" stroke="black" stroke-width="1.2"/>
  <text x="175" y="83" text-anchor="middle" font-size="10" font-family="serif">O₁</text>

  <rect x="148" y="160" width="55" height="36" rx="3" fill="#eee" stroke="black" stroke-width="1.2"/>
  <text x="175" y="183" text-anchor="middle" font-size="10" font-family="serif">O₂</text>

  <!-- Padded obstacle boundaries (dashed) -->
  <rect x="138" y="50" width="75" height="56" rx="2" fill="none" stroke="#aaa" stroke-width="0.7" stroke-dasharray="3,2"/>
  <rect x="138" y="150" width="75" height="56" rx="2" fill="none" stroke="#aaa" stroke-width="0.7" stroke-dasharray="3,2"/>

  <!-- Free-space CDT edges (thin gray background triangulation) -->
  <g stroke="#ccc" stroke-width="0.4" fill="none">
    <!-- around top -->
    <line x1="75" y1="110" x2="138" y2="50"/>
    <line x1="138" y1="50" x2="213" y2="50"/>
    <line x1="213" y1="50" x2="320" y2="110"/>
    <line x1="75" y1="110" x2="138" y2="106"/>
    <line x1="213" y1="106" x2="320" y2="110"/>
    <!-- around bottom -->
    <line x1="75" y1="146" x2="138" y2="150"/>
    <line x1="138" y1="206" x2="213" y2="206"/>
    <line x1="213" y1="150" x2="320" y2="146"/>
    <line x1="75" y1="146" x2="138" y2="206"/>
    <line x1="213" y1="206" x2="320" y2="146"/>
    <!-- gap between obstacles -->
    <line x1="138" y1="106" x2="138" y2="150"/>
    <line x1="213" y1="106" x2="213" y2="150"/>
    <line x1="138" y1="106" x2="213" y2="150"/>
  </g>

  <!-- SLEEVE: free-space triangles going above O1 -->
  <!-- Triangle 1: inside S obstacle area → S to top-left of O1 -->
  <polygon points="75,110 138,50 75,146" fill="#cde4f7" fill-opacity="0.4" stroke="#4a90d9" stroke-width="0.6"/>
  <!-- Triangle 2: free space above O1 left -->
  <polygon points="75,110 138,50 138,106" fill="#cde4f7" fill-opacity="0.4" stroke="#4a90d9" stroke-width="0.6"/>
  <!-- Triangle 3: free space above O1 -->
  <polygon points="138,50 213,50 138,106" fill="#cde4f7" fill-opacity="0.4" stroke="#4a90d9" stroke-width="0.6"/>
  <!-- Triangle 4: free space above O1 right -->
  <polygon points="213,50 138,106 213,106" fill="#cde4f7" fill-opacity="0.4" stroke="#4a90d9" stroke-width="0.6"/>
  <!-- Triangle 5: free space right of O1 -->
  <polygon points="213,50 213,106 320,110" fill="#cde4f7" fill-opacity="0.4" stroke="#4a90d9" stroke-width="0.6"/>

  <!-- Diagonals (shared edges between consecutive sleeve triangles) -->
  <g stroke="#4a90d9" stroke-width="1.3" stroke-dasharray="5,3">
    <line x1="75" y1="110" x2="138" y2="50"/>
    <line x1="138" y1="50" x2="138" y2="106"/>
    <line x1="213" y1="50" x2="138" y2="106"/>
    <line x1="213" y1="50" x2="213" y2="106"/>
    <line x1="213" y1="50" x2="320" y2="110"/>
  </g>

  <!-- Funnel shortest path (red) going above obstacles -->
  <polyline points="47,128 138,50 213,50 347,128"
            fill="none" stroke="#c0392b" stroke-width="2.5"/>
  <circle cx="47" cy="128" r="4" fill="#c0392b"/>
  <circle cx="347" cy="128" r="4" fill="#c0392b"/>

  <!-- Labels -->
  <text x="200" y="22" text-anchor="middle" font-size="12" font-family="serif" font-weight="bold">A* on CDT dual → Sleeve → Funnel path</text>
  <text x="200" y="248" text-anchor="middle" font-size="9" font-family="serif" fill="#4a90d9">shaded: sleeve (free-space triangles only)</text>
  <text x="200" y="264" text-anchor="middle" font-size="9" font-family="serif" fill="#c0392b">red: shortest path from funnel algorithm</text>
</svg>
