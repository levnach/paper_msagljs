<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Figure: Direct routing on CDT dual graph -->
  <!-- Shows CDT triangulation with obstacles, the A* path through triangles, and the funnel result -->

  <!-- Background -->
  <rect width="400" height="300" fill="white"/>

  <!-- Obstacle nodes as rounded rectangles -->
  <rect x="30" y="120" width="60" height="40" rx="5" fill="#ddd" stroke="black" stroke-width="1.5"/>
  <text x="60" y="145" text-anchor="middle" font-size="12" font-family="serif">S</text>

  <rect x="310" y="120" width="60" height="40" rx="5" fill="#ddd" stroke="black" stroke-width="1.5"/>
  <text x="340" y="145" text-anchor="middle" font-size="12" font-family="serif">T</text>

  <!-- Middle obstacle -->
  <rect x="155" y="70" width="80" height="50" rx="5" fill="#eee" stroke="black" stroke-width="1.5"/>
  <text x="195" y="100" text-anchor="middle" font-size="11" font-family="serif">O₁</text>

  <rect x="155" y="170" width="80" height="50" rx="5" fill="#eee" stroke="black" stroke-width="1.5"/>
  <text x="195" y="200" text-anchor="middle" font-size="11" font-family="serif">O₂</text>

  <!-- CDT edges (thin gray) showing triangulation in free space -->
  <g stroke="#bbb" stroke-width="0.5" fill="none">
    <!-- Top passage triangulation -->
    <line x1="90" y1="120" x2="155" y2="70"/>
    <line x1="90" y1="120" x2="155" y2="120"/>
    <line x1="155" y1="70" x2="155" y2="120"/>
    <line x1="155" y1="70" x2="235" y2="70"/>
    <line x1="235" y1="70" x2="235" y2="120"/>
    <line x1="155" y1="120" x2="235" y2="70"/>
    <line x1="235" y1="70" x2="310" y2="120"/>
    <line x1="235" y1="120" x2="310" y2="120"/>
    <line x1="235" y1="70" x2="310" y2="120"/>
    <!-- Bottom passage triangulation -->
    <line x1="90" y1="160" x2="155" y2="170"/>
    <line x1="90" y1="160" x2="155" y2="220"/>
    <line x1="155" y1="170" x2="155" y2="220"/>
    <line x1="155" y1="220" x2="235" y2="220"/>
    <line x1="235" y1="170" x2="235" y2="220"/>
    <line x1="155" y1="220" x2="235" y2="170"/>
    <line x1="235" y1="220" x2="310" y2="160"/>
    <line x1="235" y1="170" x2="310" y2="160"/>
    <!-- Connections -->
    <line x1="90" y1="120" x2="90" y2="160"/>
    <line x1="310" y1="120" x2="310" y2="160"/>
    <line x1="155" y1="120" x2="155" y2="170"/>
    <line x1="235" y1="120" x2="235" y2="170"/>
  </g>

  <!-- Constrained edges (obstacle boundaries) in darker -->
  <g stroke="#666" stroke-width="1.2" fill="none" stroke-dasharray="4,2">
    <rect x="155" y="70" width="80" height="50" rx="0"/>
    <rect x="155" y="170" width="80" height="50" rx="0"/>
  </g>

  <!-- A* path through triangles (shaded sleeve) -->
  <polygon points="90,120 155,70 235,70 310,120 310,160 235,120 155,120 90,160"
           fill="#cde4f7" fill-opacity="0.5" stroke="#4a90d9" stroke-width="1"/>

  <!-- Funnel shortest path (red) -->
  <polyline points="60,140 155,70 235,70 340,140"
            fill="none" stroke="#c0392b" stroke-width="2.5"/>

  <!-- Source and target dots -->
  <circle cx="60" cy="140" r="4" fill="#c0392b"/>
  <circle cx="340" cy="140" r="4" fill="#c0392b"/>

  <!-- Labels -->
  <text x="200" y="25" text-anchor="middle" font-size="13" font-family="serif" font-weight="bold">A* on CDT dual → Sleeve → Funnel path</text>
  <text x="190" y="55" text-anchor="middle" font-size="10" font-family="serif" fill="#4a90d9">shaded: sleeve (sequence of triangles)</text>
  <text x="200" y="280" text-anchor="middle" font-size="10" font-family="serif" fill="#c0392b">red: shortest path from funnel algorithm</text>
</svg>
